<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>무지개 구구단 팡팡! 🌈</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="particles"></div>
    <div class="game-container">
        <header>
            <h1 class="title-text">🌈 무지개 구구단 팡팡! ⭐</h1>
            <div class="score-board">
                <span>점수: <span id="score">0</span> 🍓</span>
                <span>최고 점수: <span id="high-score">0</span> 🏆</span>
            </div>
        </header>

        <main id="game-board">
            <div id="question-box" class="bounce-in">
                <div id="question">2 × 3 = ?</div>
            </div>

            <div class="answers-grid">
                <button class="answer-btn" id="btn-0" style="background-color: #ff5e5e;">6</button>
                <button class="answer-btn" id="btn-1" style="background-color: #ffb833;">8</button>
                <button class="answer-btn" id="btn-2" style="background-color: #4cd137;">10</button>
                <button class="answer-btn" id="btn-3" style="background-color: #00a8ff;">12</button>
            </div>
        </main>
        
        <div id="feedback-emoji" class="hidden"></div>
    </div>

    <!-- Celebration Emojis Container -->
    <div id="celebration-container"></div>

    <script src="main.js"></script>
</body>
</html>
